<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贵金属监测中心</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell landing-shell">
      <header class="hero landing-hero">
        <div class="hero-copy landing-copy">
          <p class="eyebrow">Precious Metals Hub</p>
          <h1>贵金属实时监测中心</h1>
          <p class="hero-text">
            欢迎进入监测中心。你可以选择黄金或白银监测台，查看 24 小时分钟级变化、历年月度趋势和历史记录。
          </p>
          <p class="mode-hint">数据来源显示为“钉子”，页面支持缩放、拖拽、十字准星与快捷键操作。</p>
        </div>
      </header>

      <main class="landing-grid">
        <a class="landing-card" href="./gold.html">
          <p class="panel-kicker">Sub Page 01</p>
          <h2>黄金监测台</h2>
          <p>进入黄金实时监测，包括分钟级图表、专家观点和历史归档。</p>
          <span class="landing-link">进入页面</span>
        </a>

        <a class="landing-card" href="./silver.html">
          <p class="panel-kicker">Sub Page 02</p>
          <h2>白银监测台</h2>
          <p>进入白银实时监测，结构与黄金一致，方便横向对比走势。</p>
          <span class="landing-link">进入页面</span>
        </a>
      </main>
    </div>
  </body>
</html>
